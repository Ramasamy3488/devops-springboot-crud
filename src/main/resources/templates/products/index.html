<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        td, th {
            text-align: center;
            vertical-align: middle !important;
        }

        .product-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="text-center my-4">Products</h1>

        <div class="text-center mb-3">
            <a class="btn btn-primary" href="/products/create">Create Product</a>
        </div>

        <table class="table table-bordered table-hover">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Image</th>
                    <th>Created At</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.brand}"></td>
                    <td th:text="${product.category}"></td>
                    <td th:text="${product.price}"></td>

                    <td>
                        <img th:src="@{'/images/' + ${product.imageFileName}}"
                             alt="image"
                             class="product-img">
                    </td>

                    <td th:text="${product.createdAt.toString().substring(0,10)}"></td>

                    <td style="white-space: nowrap;">
                        <a class="btn btn-primary btn-sm"
                           th:href="@{/products/edit(id=${product.id})}">Edit</a>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{/products/delete(id=${product.id})}"
                           onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
